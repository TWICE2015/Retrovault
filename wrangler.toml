name = "retrovault"
main = "worker.js"
compatibility_date = "2026-04-12"

# Built-in netplay signaling (EmulatorJS-Netplay protocol over Socket.IO + WebSocket).
# Deploy once: `wrangler deploy` creates the Durable Object class. Browsers default to same-origin.
[[durable_objects.bindings]]
name = "NETPLAY_DO"
class_name = "NetplayCoordinatorDO"

[[migrations]]
tag = "v1-netplay-do"
# Workers Free plan: Durable Objects must use the SQLite-backed class migration.
new_sqlite_classes = ["NetplayCoordinatorDO"]

# Optional: override netplay base URL (https, no trailing slash required). If unset, the app uses window.location.origin.
# [vars]
# DEFAULT_NETPLAY_URL = "https://custom.example.com"

# YouTube Data API v3 key (secret) — enables automatic trailer URL discovery during Hasheous scrape.
# wrangler secret put YT_API_KEY
# Or for local dev only: uncomment and use a restricted key.
# [vars]
# YT_API_KEY = "your-youtube-data-api-key"

# ScreenScraper API v2
# The Worker bakes default devid/devpassword for the registered app; optional override:
#   wrangler secret put SS_DEV_ID
#   wrangler secret put SS_DEV_PASSWORD
# Member login (required for API): each browser can enter username + site password in Scraper → Sources,
# or the operator can set server-side defaults:
#   wrangler secret put SS_USER
#   wrangler secret put SS_PASSWORD   ← ScreenScraper **website** login password (not DebugPassword)
# Optional developer debug password (from dev dashboard):
#   wrangler secret put SS_DEV_DEBUG_PASSWORD
#
# For local dev only you can also use [vars] (NOT recommended for production):
# [vars]
# SS_DEV_ID = "override-dev-id"
# SS_DEV_PASSWORD = "override-dev-password"
# SS_USER = "your-ssid"
# SS_PASSWORD = "your-sspassword"
# SS_DEV_DEBUG_PASSWORD = "your-debug-password"

[[r2_buckets]]
binding = "ROM_BUCKET"
bucket_name = "game-roms"
